<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penca Elbio · Canje de acceso</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B2A4A;
    --gold: #C9A84C;
    --gold-light: rgba(201,168,76,0.12);
    --dark: #0F1628;
    --muted: #7A8BA8;
    --border: rgba(201,168,76,0.2);
    --bg: #F5F4F0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: var(--dark);
  }
  .card {
    background: white;
    border-radius: 18px;
    border: 1px solid var(--border);
    padding: 2.5rem 2rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(27,42,74,0.10);
  }
  .escudo {
    width: 64px;
    height: 64px;
    margin: 0 auto 1.25rem;
    display: block;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 0.4rem;
  }
  .sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 2rem;
    line-height: 1.5;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 1rem;
  }
  input[type="text"] {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--navy);
    background: white;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder { letter-spacing: 0; font-family: inherit; text-transform: none; color: #b0b8c8; }
  .btn {
    width: 100%;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Estados */
  #estado { margin-top: 1.25rem; font-size: 13px; min-height: 20px; }
  #estado.error { color: #A32D2D; }
  #estado.loading { color: var(--muted); }

  /* Resultado válido */
  .result-box {
    display: none;
    margin-top: 1.5rem;
    background: var(--gold-light);
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    padding: 1.5rem 1.25rem;
  }
  .result-icon { font-size: 2.2rem; margin-bottom: 0.5rem; }
  .result-title { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem; }
  .result-sub { font-size: 12px; color: var(--muted); margin-bottom: 1.1rem; }
  .link-btn {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-weight: 700;
    font-size: 14px;
    padding: 12px 28px;
    border-radius: 8px;
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .link-btn:hover { opacity: 0.88; }
  .footer-note {
    margin-top: 2rem;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="card">
  <!-- Logo del club -->
  <img class="escudo" src="icon-192.png" alt="Elbio Universitario" onerror="this.style.display='none'" />

  <h1>Penca Elbio Ovación</h1>
  <p class="sub">Ingresá tu código de canje para obtener el link de acceso al grupo de la penca.</p>

  <div class="input-wrap">
    <input type="text" id="codigo-input" placeholder="Ej: PENCA-A3F7K2" maxlength="14" autocomplete="off" autocorrect="off" spellcheck="false" />
  </div>

  <button class="btn" id="canjear-btn" onclick="canjear()">Obtener mi acceso →</button>

  <div id="estado"></div>

  <div class="result-box" id="result-box">
    <div class="result-icon">🏆</div>
    <div class="result-title">¡Código válido!</div>
    <div class="result-sub">Hacé clic para unirte al grupo de la penca.</div>
    <a href="#" id="link-penca" class="link-btn" target="_blank">Entrar a la Penca →</a>
  </div>
</div>

<p class="footer-note">¿Problemas? Escribinos por WhatsApp al <a href="https://wa.me/59899019892" style="color:var(--gold)">099 019 892</a></p>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw96HiXbC6zIWAvnwT-o5u8sz9l5LISBQof1VkXb4-_WUYZNU_dqblX223yWxbzZYgeew/exec';

// Si viene con ?codigo=XXX en la URL, pre-llenar
(function() {
  const p = new URLSearchParams(window.location.search);
  const c = p.get('codigo');
  if (c) {
    document.getElementById('codigo-input').value = c.toUpperCase();
  }
})();

// Enter en el input
document.getElementById('codigo-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') canjear();
});

// Formatear input mientras escribe
document.getElementById('codigo-input').addEventListener('input', function() {
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
});

async function canjear() {
  const codigo = document.getElementById('codigo-input').value.trim().toUpperCase();
  const estado = document.getElementById('estado');
  const btn = document.getElementById('canjear-btn');
  const resultBox = document.getElementById('result-box');

  if (!codigo) {
    estado.className = 'error';
    estado.textContent = 'Ingresá tu código de canje.';
    return;
  }

  estado.className = 'loading';
  estado.textContent = 'Verificando código...';
  btn.disabled = true;
  resultBox.style.display = 'none';

  try {
    const res = await fetch(SCRIPT_URL + '?type=verify_penca_code&codigo=' + encodeURIComponent(codigo));
    const data = await res.json();

    if (data.ok && data.link) {
      estado.textContent = '';
      document.getElementById('link-penca').href = data.link;
      resultBox.style.display = 'block';
    } else if (data.usado) {
      estado.className = 'error';
      estado.textContent = 'Este código ya fue usado. Si creés que es un error, contactanos por WhatsApp.';
    } else {
      estado.className = 'error';
      estado.textContent = 'Código no válido. Verificá que lo hayas escrito bien.';
    }
  } catch(e) {
    estado.className = 'error';
    estado.textContent = 'Error de conexión. Intentá de nuevo en unos segundos.';
  }

  btn.disabled = false;
}
</script>
</body>
</html>
